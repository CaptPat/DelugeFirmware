name: Personal Stable-Test Build

on:
  workflow_dispatch:
  push:
    branches:
      - "personal/stable-test"

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build-type: [Release]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: personal/stable-test

      - name: Fetch container image
        run: |
          docker pull ghcr.io/synthstromaudible/dbt-toolchain:v$(cat toolchain/REQUIRED_VERSION)

      - name: Build firmware
        run: |
          docker run --rm \
            --user=$(id --user):$(id --group) \
            -e DBT_NO_PYTHON_UPGRADE=1 \
            -v $(pwd):/src \
            ghcr.io/synthstromaudible/dbt-toolchain:v$(cat toolchain/REQUIRED_VERSION) \
            build \
            --verbose \
            --tag-metadata \
            --type stable-test \
            ${{ matrix.build-type }}

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: stable-test_${{ matrix.build-type }}_firmware
          path: build/${{ matrix.build-type }}/*
          if-no-files-found: error
          retention-days: 30

  test-x86:
    name: Run tests (x86)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: personal/stable-test

      - name: Install GCC multilib
        run: |
          sudo apt-get update
          sudo apt-get install gcc-14 gcc-14-multilib g++-14-multilib
          echo "CC=gcc-14" >> $GITHUB_ENV
          echo "CXX=g++-14" >> $GITHUB_ENV

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake -B build -S tests -G Ninja

      - name: Build tests
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  format-check:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: personal/stable-test

      - name: Run clang-format check
        uses: d-griet/clang-format-lint-action@99a106be2f3f1a92d9783ea7c744fde62d8ce1fa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          source: "./src"
          extensions: "c,cpp,h,hpp"
          clangFormatVersion: 19

      - name: Run Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"
          src: "./scripts/ ./contrib ./tests ./src"

      - name: Run Ruff lint check
        uses: astral-sh/ruff-action@v3
        with:
          src: "./scripts/ ./contrib ./tests ./src"
